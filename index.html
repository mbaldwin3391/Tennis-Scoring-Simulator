<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tennis Scorebug</title>

<style>
body{
  margin:0;
  background:#0f1117;
  color:#fff;
  font-family:Arial,sans-serif;
}

.app{
  max-width:520px;
  margin:auto;
  padding:14px;
}

/* SCOREBUG */
.scorebug{
  background:linear-gradient(#1f5fb8,#0b2f7a);
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 10px 24px rgba(0,0,0,.6);
}

.row{
  display:flex;
  align-items:center;
  height:44px;
}

.row + .row{
  border-top:1px solid rgba(255,255,255,.25);
}

.name{
  flex:1;
  padding-left:10px;
  font-weight:800;
}

.server{
  width:10px;
  height:20px;
  background:#d4ff3a;
  margin-left:6px;
  transform:skewX(-20deg);
  display:none;
}

.serving .server{ display:inline-block; }

.cell{
  width:40px;
  text-align:center;
  font-weight:bold;
}

.set{
  background:#cfe5f7;
  color:#003;
}

.points{
  background:#fff;
  color:#000;
  width:52px;
}

/* Glow winner */
.win{
  animation:glow 1.6s infinite;
}

@keyframes glow{
  50%{ box-shadow:0 0 15px rgba(212,255,58,.8); }
}

/* PANEL */
.card{
  background:#1e2435;
  padding:12px;
  border-radius:10px;
  margin-top:12px;
}

.label{
  font-size:11px;
  font-weight:bold;
  color:#2d9e6b;
  margin-bottom:6px;
  text-transform:uppercase;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  color:white;
  cursor:pointer;
}

.p1{ background:#2d9e6b; }
.p2{ background:#3a4258; }

.btns{ display:flex; gap:8px; margin-top:10px;}

.log{
  font-size:12px;
  max-height:100px;
  overflow:auto;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="app">

<!-- SCOREBUG -->
<div class="scorebug">
  <div id="row0" class="row serving">
    <div class="name">PLAYER 1 <span class="server"></span></div>
    <div class="cell set" id="g0">0</div>
    <div class="cell points" id="p0">0</div>
  </div>

  <div id="row1" class="row">
    <div class="name">PLAYER 2 <span class="server"></span></div>
    <div class="cell set" id="g1">0</div>
    <div class="cell points" id="p1">0</div>
  </div>
</div>

<!-- EXPLANATION -->
<div class="card">
  <div class="label" id="label">Ready</div>
  <div id="info">Click a button to start the match</div>
</div>

<!-- BUTTONS -->
<div class="btns">
  <button class="p1" onclick="point(0)">Point → Player 1</button>
  <button class="p2" onclick="point(1)">Point → Player 2</button>
</div>

<!-- LOG -->
<div class="card log" id="log">
Match not started
</div>

</div>

<script>
const LABELS = ['0','15','30','40'];

let S = {
  pts:[0,0],
  games:[0,0],
  sets:[0,0],
  server:0,
  over:false
};

function txt(p,o){
  if(p<3 && o<3) return LABELS[p];
  if(p===o) return '40';
  if(p>o) return 'AD';
  return '40';
}

/* ───────── EXPLANATION ENGINE ───────── */

function explain(){
  const [p0,p1]=S.pts;
  const server=S.server;

  if(S.over){
    setExp("Match Won",
      `Player ${S.winner+1} wins the match.`);
    return;
  }

  if(p0>=3 && p1>=3 && p0===p1){
    setExp("Deuce",
      "Tie at 40–40. Must win two straight points.");
    return;
  }

  if(p0>=3 && p1>=3){
    let leader = p0>p1?0:1;
    setExp(
      `Advantage Player ${leader+1}`,
      "One more point wins the game. Lose → back to Deuce."
    );
    return;
  }

  // Game point detection
  for(let i=0;i<2;i++){
    let o=1-i;
    if(S.pts[i]==3 && S.pts[o]<3){
      let prefix = (S.sets[i]==1 && S.games[i]>=5) ? "Match Point" :
                   (S.games[i]>=5 ? "Set Point" : "Game Point");

      setExp(prefix,
        `Player ${i+1} is one point from winning.`);
      return;
    }
  }

  setExp("In Play",
    `Score ${txt(p0,p1)}. Player ${server+1} serving.`);
}

function setExp(title,msg){
  label.innerText = title;
  info.innerText = msg;
}

/* ───────── CORE LOGIC ───────── */

function update(){
  p0.innerText = txt(S.pts[0],S.pts[1]);
  p1.innerText = txt(S.pts[1],S.pts[0]);

  g0.innerText = S.games[0];
  g1.innerText = S.games[1];

  row0.classList.toggle("serving", S.server===0);
  row1.classList.toggle("serving", S.server===1);

  explain();
}

function log(msg){
  logDiv.innerHTML = msg+"<br>"+logDiv.innerHTML;
}

function point(pi){
  if(S.over) return;

  let o=1-pi;
  S.pts[pi]++;

  animate(pi);

  if(S.pts[pi]>=4 && S.pts[pi]-S.pts[o]>=2){
    winGame(pi);
    return;
  }

  update();
}

function animate(i){
  let el=document.getElementById("p"+i);
  el.style.transform="scale(1.2)";
  setTimeout(()=>el.style.transform="scale(1)",120);
}

function winGame(pi){
  let o=1-pi;
  S.games[pi]++;
  S.pts=[0,0];
  S.server=o;

  log("Game → Player "+(pi+1));

  if(S.games[pi]>=6 && S.games[pi]-S.games[o]>=2){
    winSet(pi); return;
  }

  update();
}

function winSet(pi){
  S.sets[pi]++;
  S.games=[0,0];

  log("SET → Player "+(pi+1));

  if(S.sets[pi]==2){
    S.over=true;
    S.winner=pi;
    setExp("Match Complete",`Player ${pi+1} wins`);
    document.getElementById("row"+pi).classList.add("win");
  }

  update();
}

/* INIT */
update();
</script>

</body>
</html>
