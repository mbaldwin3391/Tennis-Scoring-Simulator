<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tennis Scorebug</title>

<style>
body{
  margin:0;
  background:#0f1117;
  color:#fff;
  font-family:Arial,sans-serif;
}

.app{
  max-width:520px;
  margin:auto;
  padding:14px;
}

.scorebug{
  background:linear-gradient(#1f5fb8,#0b2f7a);
  border-radius:10px;
  overflow:hidden;
}

.row{
  display:flex;
  align-items:center;
  height:44px;
}

.row + .row{
  border-top:1px solid rgba(255,255,255,.2);
}

.name{
  flex:1;
  padding-left:10px;
  font-weight:bold;
}

.server{
  width:10px;
  height:20px;
  background:#d4ff3a;
  margin-left:6px;
  transform:skewX(-20deg);
  display:none;
}

.serving .server{ display:inline-block; }

.cell{
  width:40px;
  text-align:center;
}

.points{
  background:#fff;
  color:#000;
  width:50px;
}

.set{
  background:#cfe5f7;
  color:#000;
}

.card{
  background:#1e2435;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:white;
  font-weight:bold;
}

.btns{ display:flex; gap:8px; margin-top:10px;}

.p1{ background:#2d9e6b;}
.p2{ background:#3a4258;}
</style>
</head>

<body>

<div class="app">

<div class="scorebug">
  <div id="row0" class="row serving">
    <div class="name">PLAYER 1 <span class="server"></span></div>
    <div class="cell set" id="g0">0</div>
    <div class="cell points" id="p0">0</div>
  </div>

  <div id="row1" class="row">
    <div class="name">PLAYER 2 <span class="server"></span></div>
    <div class="cell set" id="g1">0</div>
    <div class="cell points" id="p1">0</div>
  </div>
</div>

<div class="card">
  <div id="label">Ready</div>
  <div id="info">Click a button to start</div>
</div>

<div class="btns">
  <button onclick="point(0)" class="p1">Player 1</button>
  <button onclick="point(1)" class="p2">Player 2</button>
</div>

</div>

<script>
const LABELS = ['0','15','30','40'];

let S = {
  pts:[0,0],
  games:[0,0],
  sets:[0,0],
  server:0,
  over:false,
  winner:null
};

/* ✅ EXPLICIT DOM REFERENCES */
const el = {
  p0: document.getElementById("p0"),
  p1: document.getElementById("p1"),
  g0: document.getElementById("g0"),
  g1: document.getElementById("g1"),
  row0: document.getElementById("row0"),
  row1: document.getElementById("row1"),
  label: document.getElementById("label"),
  info: document.getElementById("info")
};

function txt(p,o){
  if(p<3 && o<3) return LABELS[p];
  if(p===o) return '40';
  if(p>o) return 'AD';
  return '40';
}

/* ✅ EXPLANATION */
function explain(){
  if(S.over){
    el.label.innerText="Match Won";
    el.info.innerText=`Player ${S.winner+1} wins`;
    return;
  }

  if(S.pts[0]>=3 && S.pts[1]>=3 && S.pts[0]===S.pts[1]){
    el.label.innerText="Deuce";
    el.info.innerText="Win two straight points";
    return;
  }

  el.label.innerText="In Play";
  el.info.innerText=`Player ${S.server+1} serving`;
}

function update(){
  el.p0.innerText = txt(S.pts[0],S.pts[1]);
  el.p1.innerText = txt(S.pts[1],S.pts[0]);

  el.g0.innerText = S.games[0];
  el.g1.innerText = S.games[1];

  el.row0.classList.toggle("serving", S.server===0);
  el.row1.classList.toggle("serving", S.server===1);

  explain();
}

function point(pi){
  if(S.over) return;

  let o=1-pi;
  S.pts[pi]++;

  if(S.pts[pi]>=4 && S.pts[pi]-S.pts[o]>=2){
    winGame(pi);
    return;
  }

  update();
}

function winGame(pi){
  let o=1-pi;
  S.games[pi]++;
  S.pts=[0,0];
  S.server=o;

  if(S.games[pi]>=6 && S.games[pi]-S.games[o]>=2){
    winSet(pi);
    return;
  }

  update();
}

function winSet(pi){
  S.sets[pi]++;
  S.games=[0,0];

  if(S.sets[pi]===2){
    S.over=true;
    S.winner=pi;
  }

  update();
}

update();
</script>

</body>
</html>
