<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tennis Scorebug</title>

<style>
body{
  margin:0;
  background:#0f1117;
  color:#fff;
  font-family:Arial, sans-serif;
}

.app{
  max-width:520px;
  margin:auto;
  padding:16px;
}

/* SCOREBUG */
.scorebug{
  background:linear-gradient(#1f5fb8,#0b2f7a);
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.5);
}

.row{
  display:flex;
  align-items:center;
  height:44px;
}

.row + .row{
  border-top:1px solid rgba(255,255,255,.2);
}

.name{
  flex:1;
  padding-left:10px;
  font-weight:700;
}

.cell{
  width:40px;
  text-align:center;
  font-weight:bold;
}

.points{
  background:#fff;
  color:#000;
  width:50px;
}

.set{
  background:#cfe5f7;
  color:#003;
}

.glow{
  animation:glow 1.5s infinite;
}

@keyframes glow{
  0%,100%{box-shadow:0 0 0 rgba(212,255,58,0);}
  50%{box-shadow:0 0 15px rgba(212,255,58,.7);}
}

/* PANEL */
.card{
  background:#1e2435;
  padding:12px;
  border-radius:10px;
  margin-top:12px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  color:white;
  cursor:pointer;
}

.p1{ background:#2d9e6b; }
.p2{ background:#3a4258; }

.btns{ display:flex; gap:8px; margin-top:10px;}

.log{
  font-size:12px;
  max-height:100px;
  overflow:auto;
  color:#aaa;
}
</style>
</head>

<body>

<div class="app">

<div class="scorebug">
  <div class="row" id="row0">
    <div class="name">PLAYER 1</div>
    <div class="cell set" id="g0">0</div>
    <div class="cell points" id="p0">0</div>
  </div>

  <div class="row" id="row1">
    <div class="name">PLAYER 2</div>
    <div class="cell set" id="g1">0</div>
    <div class="cell points" id="p1">0</div>
  </div>
</div>

<div class="card" id="info">
  Click a button to start the match
</div>

<div class="btns">
  <button class="p1" onclick="point(0)">Point → Player 1</button>
  <button class="p2" onclick="point(1)">Point → Player 2</button>
</div>

<div class="card log" id="log">
Match not started
</div>

</div>

<script>
const PTS = ['0','15','30','40'];

let state = {
  pts:[0,0],
  games:[0,0],
  sets:[0,0],
  server:0,
  over:false
};

function display(p,o){
  if(p<3 && o<3) return PTS[p];
  if(p===o) return '40';
  if(p>o) return 'AD';
  return '40';
}

function update(){
  p0.innerText = display(state.pts[0],state.pts[1]);
  p1.innerText = display(state.pts[1],state.pts[0]);

  g0.innerText = state.games[0];
  g1.innerText = state.games[1];
}

function log(msg){
  logDiv.innerHTML = msg+"<br>"+logDiv.innerHTML;
}

function point(pi){
  if(state.over) return;

  let opp = 1-pi;
  state.pts[pi]++;

  animate(pi);

  if(state.pts[pi]>=4 && state.pts[pi]-state.pts[opp]>=2){
    winGame(pi);
    return;
  }

  update();
}

function animate(i){
  let el = document.getElementById("p"+i);
  el.style.transform="scale(1.2)";
  setTimeout(()=>el.style.transform="scale(1)",150);
}

function winGame(pi){
  let opp=1-pi;
  state.games[pi]++;
  state.pts=[0,0];
  state.server=opp;

  log("Game → Player "+(pi+1));

  if(state.games[pi]>=6 && state.games[pi]-state.games[opp]>=2){
    winSet(pi);
    return;
  }

  update();
}

function winSet(pi){
  state.sets[pi]++;
  state.games=[0,0];

  log("SET → Player "+(pi+1));

  if(state.sets[pi]===2){
    state.over=true;
    document.getElementById("info").innerText =
      "🎾 Player "+(pi+1)+" WINS MATCH";
    document.getElementById("row"+pi).classList.add("glow");
  }

  update();
}

update();
</script>

</body>
</html>
