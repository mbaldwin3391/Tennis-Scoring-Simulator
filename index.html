<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Scoring Simulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'monospace'],
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @keyframes scorePop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes winGlow {
      0%, 100% { filter: drop-shadow(0 0 0 rgba(212,255,58,0)); }
      50%      { filter: drop-shadow(0 0 14px rgba(212,255,58,0.55)); }
    }
    .score-pop-0 { animation: scorePop 0.25s ease-out; }
    .score-pop-1 { animation: scorePop 0.25s ease-out; }
    .explanation-fade { animation: fadeIn 0.25s ease-out; }
    .win-glow { animation: winGlow 1.8s ease-in-out infinite; }
    #match-log::-webkit-scrollbar { width: 4px; }
    #match-log::-webkit-scrollbar-track { background: transparent; }
    #match-log::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 2px; }

    /* ── Broadcast scorebug ────────────────────────────────────── */
    .scorebug {
      position: relative;
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff;
      filter: drop-shadow(0 10px 24px rgba(0,0,0,0.55));
    }
    .scorebug-tab {
      display: inline-block;
      background: linear-gradient(180deg, #0a2a5e 0%, #061a3d 100%);
      color: #cfe0ff;
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 0.12em;
      padding: 6px 22px 6px 14px;
      clip-path: polygon(0 0, 100% 0, calc(100% - 12px) 100%, 0 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .scorebug-bar {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0) 22%, rgba(0,0,0,0.18) 100%),
        linear-gradient(180deg, #1f5fb8 0%, #134295 50%, #0b2f7a 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -1px 0 rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .scorebug-bar::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(115deg, transparent 35%, rgba(255,255,255,0.07) 50%, transparent 65%);
      pointer-events: none;
    }
    .scorebug-row {
      display: flex; align-items: stretch;
      height: 44px;
      position: relative;
    }
    .scorebug-divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.22) 30%, rgba(255,255,255,0.22) 70%, rgba(255,255,255,0.04));
    }
    .sb-flag {
      width: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; line-height: 1;
    }
    .sb-flag svg { width: 26px; height: 17px; box-shadow: 0 1px 2px rgba(0,0,0,0.5); border-radius: 1px; display: block; }
    .sb-name {
      flex: 1;
      display: flex; align-items: center; gap: 10px;
      font-weight: 800; font-size: 19px;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      padding-right: 10px;
      min-width: 0;
    }
    .sb-seed {
      font-weight: 700; font-size: 12px; opacity: 0.85;
    }
    .sb-serve {
      display: inline-block;
      width: 14px; height: 22px;
      background: linear-gradient(180deg, #e6ff52 0%, #b6e63a 100%);
      transform: skewX(-22deg);
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(212,255,58,0.55);
      visibility: hidden;
    }
    .sb-serve.is-serving { visibility: visible; }
    .sb-pastset {
      width: 34px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 20px;
      color: #d4ff3a;
      text-shadow: 0 1px 2px rgba(0,0,0,0.45);
      font-variant-numeric: tabular-nums;
    }
    .sb-pastset sup {
      font-size: 11px; font-weight: 800;
      margin-left: 1px;
      top: -0.55em;
    }
    .sb-curset {
      width: 38px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 20px;
      background: linear-gradient(180deg, #cfe5f7 0%, #9cc6e8 100%);
      color: #0a2a5e;
      font-variant-numeric: tabular-nums;
      box-shadow: inset 1px 0 0 rgba(0,0,0,0.15), inset -1px 0 0 rgba(255,255,255,0.4);
    }
    .sb-curpts {
      width: 52px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #e8eef5 100%);
      color: #0a2a5e;
      font-variant-numeric: tabular-nums;
      box-shadow: inset 1px 0 0 rgba(0,0,0,0.18);
    }
  </style>
</head>
<body class="bg-[#0f1117] text-[#f1f5f9] min-h-screen font-sans antialiased">
  <div class="max-w-xl mx-auto px-4 py-10">

    <!-- Header -->
    <div class="mb-7">
      <div class="h-0.5 w-10 bg-[#2d9e6b] mb-3 rounded-full"></div>
      <h1 class="text-xl font-semibold tracking-tight text-[#f1f5f9]">Tennis Scoring Simulator</h1>
      <p class="text-sm text-white mt-1">Best of 3 sets &middot; Click a button to award a point</p>
    </div>

    <!-- Broadcast Scorebug -->
    <div class="scorebug mb-6 mt-2">
      <div class="scorebug-tab">1ST ROUND</div>
      <div class="scorebug-bar" id="scoreboard-card">

        <!-- Player 1 row -->
        <div id="row-0" class="scorebug-row">
          <div class="sb-flag">
            <!-- USA flag -->
            <svg viewBox="0 0 26 17" xmlns="http://www.w3.org/2000/svg" aria-label="USA">
              <rect width="26" height="17" fill="#b22234"/>
              <g fill="#fff">
                <rect y="1.31" width="26" height="1.31"/>
                <rect y="3.92" width="26" height="1.31"/>
                <rect y="6.54" width="26" height="1.31"/>
                <rect y="9.15" width="26" height="1.31"/>
                <rect y="11.77" width="26" height="1.31"/>
                <rect y="14.38" width="26" height="1.31"/>
              </g>
              <rect width="10.4" height="9.15" fill="#3c3b6e"/>
            </svg>
          </div>
          <div class="sb-name">
            <span>PLAYER 1</span>
            <span id="serve-mark-0" class="sb-serve"></span>
          </div>
          <div id="past-sets-0" class="flex"></div>
          <div id="cur-set-0" class="sb-curset">0</div>
          <div id="cur-pts-0" class="sb-curpts">0</div>
        </div>

        <div class="scorebug-divider"></div>

        <!-- Player 2 row -->
        <div id="row-1" class="scorebug-row">
          <div class="sb-flag">
            <!-- Australia flag (simplified) -->
            <svg viewBox="0 0 26 17" xmlns="http://www.w3.org/2000/svg" aria-label="Australia">
              <rect width="26" height="17" fill="#00247d"/>
              <!-- Union Jack canton -->
              <clipPath id="ausCanton"><rect width="13" height="8.5"/></clipPath>
              <g clip-path="url(#ausCanton)">
                <path d="M0,0 L13,8.5 M13,0 L0,8.5" stroke="#fff" stroke-width="1.4"/>
                <path d="M0,0 L13,8.5 M13,0 L0,8.5" stroke="#cf142b" stroke-width="0.7"/>
                <path d="M6.5,0 V8.5 M0,4.25 H13" stroke="#fff" stroke-width="2.2"/>
                <path d="M6.5,0 V8.5 M0,4.25 H13" stroke="#cf142b" stroke-width="1.1"/>
              </g>
              <!-- Commonwealth star -->
              <circle cx="6.5" cy="12.5" r="1.3" fill="#fff"/>
              <!-- Southern Cross (simplified dots) -->
              <circle cx="19" cy="4" r="0.9" fill="#fff"/>
              <circle cx="22" cy="7.5" r="0.9" fill="#fff"/>
              <circle cx="18" cy="10.5" r="0.9" fill="#fff"/>
              <circle cx="21" cy="12.5" r="0.7" fill="#fff"/>
              <circle cx="20.5" cy="9" r="0.55" fill="#fff"/>
            </svg>
          </div>
          <div class="sb-name">
            <span>PLAYER 2</span>
            <span id="serve-mark-1" class="sb-serve"></span>
          </div>
          <div id="past-sets-1" class="flex"></div>
          <div id="cur-set-1" class="sb-curset">0</div>
          <div id="cur-pts-1" class="sb-curpts">0</div>
        </div>

      </div>
    </div>

    <!-- Explanation Panel -->
    <div id="explanation-panel" class="rounded-2xl p-5 mb-4 explanation-fade" style="background:#1e2435;box-shadow:0 2px 16px rgba(0,0,0,0.35);height:200px;">
      <div id="explanation-label" class="text-[11px] font-bold uppercase tracking-widest mb-1.5 text-[#2d9e6b]">Ready</div>
      <div id="explanation-text" class="text-sm text-white leading-relaxed">
        Click a button below to award a point and start the match. Points in tennis are counted 0 → 15 → 30 → 40, then the game is won.
      </div>
    </div>

    <!-- Point Buttons -->
    <div class="grid grid-cols-2 gap-3 mb-4">
      <button type="button" id="btn-0" onclick="addPoint(0)"
        class="py-4 rounded-xl font-semibold text-white text-sm transition-transform duration-100 active:scale-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-offset-[#0f1117] focus-visible:ring-[#2d9e6b]"
        style="background:#2d9e6b;box-shadow:0 4px 20px rgba(45,158,107,0.28),0 1px 4px rgba(0,0,0,0.3);">
        Point &rarr; Player 1
      </button>
      <button type="button" id="btn-1" onclick="addPoint(1)"
        class="py-4 rounded-xl font-semibold text-[#cbd5e1] text-sm transition-transform duration-100 active:scale-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-offset-[#0f1117] focus-visible:ring-[#64748b]"
        style="background:#3a4258;box-shadow:0 4px 20px rgba(0,0,0,0.25),0 1px 4px rgba(0,0,0,0.3);">
        Point &rarr; Player 2
      </button>
    </div>

    <!-- Match Log -->
    <div class="rounded-2xl p-4 mb-4" style="background:#131720;box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);">
      <div class="text-[10px] text-[#334155] uppercase tracking-widest mb-2 font-semibold">Match Log</div>
      <div id="match-log" class="space-y-1 max-h-28 overflow-y-auto pr-1">
        <div class="text-xs text-[#334155] italic">Match not started — awaiting first point.</div>
      </div>
    </div>

    <!-- Reset -->
    <div class="flex justify-end">
      <button type="button" onclick="resetMatch()"
        class="text-xs text-[#334155] hover:text-[#64748b] transition-colors duration-150 py-2 px-3 rounded-lg hover:bg-[#1a1f2e] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#334155]">
        ↺ Reset Match
      </button>
    </div>

  </div>
  <script>
    // ── Constants ────────────────────────────────────────────────
    const POINT_LABELS = ['0', '15', '30', '40'];
    const LABEL_COLORS = {
      neutral:    '#2d9e6b',
      deuce:      '#f59e0b',
      advantage:  '#f59e0b',
      breakpoint: '#f59e0b',
      setpoint:   '#ef4444',
      matchpoint: '#ef4444',
      tiebreak:   '#38bdf8',
      win:        '#2d9e6b',
    };

    // ── State ────────────────────────────────────────────────────
    let state = {
      sets:               [0, 0],
      games:              [0, 0],
      points:             [0, 0],   // raw counts; 0=love,1=15,2=30,3=40,4+=deuce logic
      server:             0,        // index of current server (0 or 1)
      isTiebreak:         false,
      tiebreakFirstServer: 0,       // server at tiebreak start (for post-set serve flip)
      tiebreakPointCount: 0,        // total points played in current tiebreak
      setHistory:         [],       // [{p:[n,n]}, …] one entry per completed set
      matchOver:          false,
      winner:             null,
      log:                [],       // string array, newest first
    };

    // ── Render ───────────────────────────────────────────────────
    function render() {
      const S = state;

      // Serve mark (yellow slash)
      document.getElementById('serve-mark-0').classList.toggle('is-serving', S.server === 0 && !S.matchOver);
      document.getElementById('serve-mark-1').classList.toggle('is-serving', S.server === 1 && !S.matchOver);

      // Past sets — render dynamic cells per completed set
      for (let i = 0; i < 2; i++) {
        const c = document.getElementById(`past-sets-${i}`);
        c.innerHTML = '';
        S.setHistory.forEach(entry => {
          const cell = document.createElement('div');
          cell.className = 'sb-pastset';
          const games = entry.p[i];
          if (entry.tb) {
            cell.innerHTML = `${games}<sup>${entry.tb[i]}</sup>`;
          } else {
            cell.textContent = games;
          }
          c.appendChild(cell);
        });
      }

      // Current set games
      for (let i = 0; i < 2; i++) {
        document.getElementById(`cur-set-${i}`).textContent = S.games[i];
      }

      // Current points
      for (let i = 0; i < 2; i++) {
        const el = document.getElementById(`cur-pts-${i}`);
        el.textContent = getPointDisplay(i);
      }

      // Winning row highlight
      for (let i = 0; i < 2; i++) {
        const row = document.getElementById(`row-${i}`);
        const isWinner = S.matchOver && S.winner === i;
        row.classList.toggle('win-glow', isWinner);
      }

      // Button states
      const disabled = S.matchOver;
      ['btn-0','btn-1'].forEach((id) => {
        const btn = document.getElementById(id);
        btn.disabled = disabled;
        btn.style.opacity = disabled ? '0.4' : '1';
        btn.style.cursor  = disabled ? 'not-allowed' : 'pointer';
      });

      // Explanation panel
      const exp = getExplanation();
      const labelEl = document.getElementById('explanation-label');
      const textEl  = document.getElementById('explanation-text');
      const panel   = document.getElementById('explanation-panel');

      labelEl.textContent = exp.label;
      textEl.textContent  = exp.message;

      // Color the label by situation type
      labelEl.style.color = LABEL_COLORS[exp.type] || '#2d9e6b';

      // Restart fade animation on panel
      panel.classList.remove('explanation-fade');
      void panel.offsetWidth; // force reflow
      panel.classList.add('explanation-fade');

      // Match log
      renderLog();
    }

    function renderLog() {
      const container = document.getElementById('match-log');
      container.innerHTML = '';
      if (state.log.length === 0) {
        const placeholder = document.createElement('div');
        placeholder.className = 'text-xs text-[#334155] italic';
        placeholder.textContent = 'Match not started — awaiting first point.';
        container.appendChild(placeholder);
        return;
      }
      state.log.slice(0, 10).forEach((entry, i) => {
        const div = document.createElement('div');
        div.className = `text-xs ${i === 0 ? 'text-[#64748b]' : 'text-[#334155]'} leading-relaxed`;
        div.textContent = entry;
        container.appendChild(div);
      });
    }

    function addLog(msg) {
      state.log.unshift(msg);
      if (state.log.length > 20) state.log.pop();
    }

    // ── Display helpers (stubs — filled in Task 3 & 7) ──────────
    function getPointDisplay(pi) {
      const p = state.points[pi];
      const o = state.points[1 - pi];
      if (state.isTiebreak) return String(p);
      if (p < 3 || o < 3) return POINT_LABELS[Math.min(p, 3)];
      if (p === o) return '40';          // deuce
      if (p > o)   return 'AD';          // advantage
      return '40';                        // opponent has advantage
    }

    function getExplanation() {
      const S = state;
      const p0 = S.points[0], p1 = S.points[1];
      const g0 = S.games[0],  g1 = S.games[1];
      const s0 = S.sets[0],   s1 = S.sets[1];
      const server = S.server;
      const P = ['Player 1', 'Player 2'];

      // Match over
      if (S.matchOver) {
        const w = S.winner;
        const setStr = S.setHistory.map((h,i) => `Set ${i+1}: ${h.p[0]}–${h.p[1]}`).join(' · ');
        return {
          label: `${P[w]} wins the match!`,
          message: `${P[w]} takes the match. ${setStr}. Click Reset to play again.`,
          type: 'win'
        };
      }

      // Tiebreak active
      if (S.isTiebreak) {
        if (p0 === 0 && p1 === 0) {
          return {
            label: 'Tiebreak!',
            message: `Games are tied at 6–6. In a tiebreak, points are counted 1, 2, 3… The first player to reach 7 points — with at least a 2-point lead — wins the set. ${P[server]} serves the first point.`,
            type: 'tiebreak'
          };
        }
        // Tiebreak set/match point
        for (let i = 0; i < 2; i++) {
          const opp = 1 - i;
          const oneAway = S.points[i] >= 6 && S.points[i] - S.points[opp] >= 1;
          if (oneAway) {
            const isMatchPoint = S.sets[i] === 1;
            return {
              label: isMatchPoint ? 'Match Point!' : 'Set Point',
              message: `${P[i]} leads ${S.points[i]}–${S.points[opp]} in the tiebreak and needs just one more point to win the ${isMatchPoint ? 'match' : 'set'}. ${P[server]} is serving.`,
              type: isMatchPoint ? 'matchpoint' : 'setpoint'
            };
          }
        }
        return {
          label: `Tiebreak: ${p0}–${p1}`,
          message: `First to 7 points with a 2-point lead wins the set. ${P[server]} is serving.`,
          type: 'tiebreak'
        };
      }

      // Deuce
      if (p0 >= 3 && p1 >= 3 && p0 === p1) {
        return {
          label: 'Deuce',
          message: 'Both players are tied at Deuce (40–40). A player must win two consecutive points to win this game — next point gives Advantage.',
          type: 'deuce'
        };
      }

      // Would winning this game also win the set? (need 6+ games and 2-game lead after the win)
      const wouldWinSet = (pi) => S.games[pi] >= 5 && S.games[pi] - S.games[1 - pi] >= 1;

      // Advantage
      if (p0 >= 3 && p1 >= 3 && p0 !== p1) {
        const leader = p0 > p1 ? 0 : 1;
        const isSetPoint   = wouldWinSet(leader);
        const isMatchPoint = isSetPoint && S.sets[leader] === 1;
        const prefix = isMatchPoint ? 'Match Point — ' : isSetPoint ? 'Set Point — ' : '';
        return {
          label: `${prefix}Advantage ${P[leader]}`,
          message: `${P[leader]} has the Advantage. One more point wins the game. Losing the next point brings it back to Deuce.`,
          type: isMatchPoint ? 'matchpoint' : isSetPoint ? 'setpoint' : 'advantage'
        };
      }

      // Helper: is player pi one point away from winning the current game?
      function gamePointFor(pi) {
        const opp = 1 - pi;
        return S.points[pi] === 3 && S.points[opp] < 3;
      }

      // Match point (non-deuce)
      for (let i = 0; i < 2; i++) {
        if (S.sets[i] === 1 && wouldWinSet(i) && gamePointFor(i)) {
          const isBreak = server !== i;
          return {
            label: isBreak ? 'Match Point (Break)!' : 'Match Point!',
            message: `${P[i]} is one point from winning the match!${isBreak ? ` This is also a break point — ${P[i]} is receiving.` : ''} Score: ${POINT_LABELS[p0]}–${POINT_LABELS[p1]}.`,
            type: 'matchpoint'
          };
        }
      }

      // Set point (non-deuce)
      for (let i = 0; i < 2; i++) {
        if (wouldWinSet(i) && gamePointFor(i)) {
          const isBreak = server !== i;
          return {
            label: isBreak ? 'Set Point (Break)' : 'Set Point',
            message: `${P[i]} is one point from winning the set.${isBreak ? ` This is also a break point.` : ''} Score: ${POINT_LABELS[p0]}–${POINT_LABELS[p1]}.`,
            type: 'setpoint'
          };
        }
      }

      // Break point (receiver is one point from winning the game)
      for (let i = 0; i < 2; i++) {
        if (server !== i && gamePointFor(i)) {
          return {
            label: 'Break Point',
            message: `Break point for ${P[i]}! They can win a game on ${P[server]}'s serve — called a "break" because it breaks the server's hold on the game.`,
            type: 'breakpoint'
          };
        }
      }

      // Game point for server
      for (let i = 0; i < 2; i++) {
        if (server === i && gamePointFor(i)) {
          return {
            label: 'Game Point',
            message: `${P[i]} is one point away from winning this game while serving. Score: ${POINT_LABELS[p0]}–${POINT_LABELS[p1]}.`,
            type: 'neutral'
          };
        }
      }

      // First point of match
      if (p0 === 0 && p1 === 0 && g0 === 0 && g1 === 0 && s0 === 0 && s1 === 0 && S.log.length === 0) {
        return {
          label: 'Match Begins',
          message: `${P[server]} serves first. Points go: 0 → 15 → 30 → 40 → Game. At 40–40 it\'s Deuce — you need two straight points to win the game from there.`,
          type: 'neutral'
        };
      }

      // Start of a new game
      if (p0 === 0 && p1 === 0) {
        const gameNum = g0 + g1 + 1;
        return {
          label: `Game ${gameNum}`,
          message: `New game — ${P[server]} is serving. Score: ${g0}–${g1} in the current set.`,
          type: 'neutral'
        };
      }

      // Normal in-progress score
      const ps = p0 < 3 ? POINT_LABELS[p0] : '40';
      const os = p1 < 3 ? POINT_LABELS[p1] : '40';
      return {
        label: `${ps} – ${os}`,
        message: `Score is ${ps}–${os}. ${P[server]} is serving. Win the game by reaching 40 and having a 2-point lead (or winning from Advantage).`,
        type: 'neutral'
      };
    }

    // ── Reset ────────────────────────────────────────────────────
    function resetMatch() {
      state = {
        sets: [0, 0], games: [0, 0], points: [0, 0],
        server: 0, isTiebreak: false,
        tiebreakFirstServer: 0, tiebreakPointCount: 0,
        setHistory: [], matchOver: false, winner: null, log: [],
      };
      render();
    }

    // Initial render
    render();

    // ── Point scoring ────────────────────────────────────────────
    function addPoint(pi) {
      if (state.matchOver) return;
      if (state.isTiebreak) { addTiebreakPoint(pi); return; }

      const opp = 1 - pi;
      state.points[pi]++;

      animateScore(pi);

      const p = state.points[pi];
      const o = state.points[opp];

      // Win condition: at least 4 points AND 2 ahead
      if (p >= 4 && p - o >= 2) {
        winGame(pi);
        return;
      }

      render();
    }

    function animateScore(pi) {
      const el = document.getElementById(`cur-pts-${pi}`);
      el.classList.remove(`score-pop-${pi}`);
      void el.offsetWidth;
      el.classList.add(`score-pop-${pi}`);
    }

    function winGame(pi) {
      const opp = 1 - pi;
      state.games[pi]++;
      state.points = [0, 0];
      state.server = 1 - state.server;   // serve alternates each game

      const g  = state.games[pi];
      const og = state.games[opp];
      const totalGames = g + og;

      addLog(`Game ${totalGames}: ${['Player 1','Player 2'][pi]} wins (${g}–${og})`);

      // Set win: at least 6 games AND 2 ahead (e.g. 6-4, 7-5)
      if (g >= 6 && g - og >= 2) { winSet(pi); return; }

      // Tiebreak: 6-6
      if (g === 6 && og === 6) { startTiebreak(); return; }

      render();
    }

    function winSet(pi) {
      state.setHistory.push({ p: [...state.games] });
      state.sets[pi]++;
      state.games = [0, 0];
      state.points = [0, 0];

      addLog(`── Set ${state.sets[0]+state.sets[1]} → Player ${pi+1} wins ──`);

      if (state.sets[pi] >= 2) { winMatch(pi); return; }

      render();
    }

    function winMatch(pi) {
      state.matchOver = true;
      state.winner = pi;
      const score = state.setHistory.map(s => `${s.p[pi]}–${s.p[1-pi]}`).join(', ');
      addLog(`🎾 Player ${pi+1} wins the match! (${score})`);
      render();
      launchConfetti();
    }

    function launchConfetti() {
      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;';
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      const colors = ['#d4ff3a', '#3aa0ff', '#ff5d8f', '#ffb43a', '#7bf0a3', '#c084fc', '#ffffff'];
      const N = 180;
      const pieces = Array.from({length: N}, () => ({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * canvas.height * 0.5,
        w: 6 + Math.random() * 6,
        h: 8 + Math.random() * 8,
        vx: -2 + Math.random() * 4,
        vy: 3 + Math.random() * 4,
        rot: Math.random() * Math.PI * 2,
        vr: -0.2 + Math.random() * 0.4,
        color: colors[Math.floor(Math.random() * colors.length)],
      }));
      const start = performance.now();
      const duration = 3500;
      const fadeStart = 2800;
      function frame(now) {
        const elapsed = now - start;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const alpha = elapsed < fadeStart ? 1 : Math.max(0, 1 - (elapsed - fadeStart) / (duration - fadeStart));
        ctx.globalAlpha = alpha;
        for (const p of pieces) {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.08;
          p.rot += p.vr;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        }
        if (elapsed < duration) {
          requestAnimationFrame(frame);
        } else {
          canvas.remove();
        }
      }
      requestAnimationFrame(frame);
    }

    function startTiebreak() {
      state.isTiebreak = true;
      state.tiebreakFirstServer = state.server;
      state.tiebreakPointCount = 0;
      addLog('Tiebreak — first to 7 points (win by 2)');
      render();
    }

    function addTiebreakPoint(pi) {
      const opp = 1 - pi;
      state.points[pi]++;
      state.tiebreakPointCount++;

      animateScore(pi);

      // Serve rotation: switch after point 1, then every 2 points
      // Pattern: A serves pt1; B serves pts 2-3; A serves pts 4-5; etc.
      // Switch happens when tiebreakPointCount is odd (1, 3, 5, 7 ...)
      if (state.tiebreakPointCount % 2 === 1) {
        state.server = 1 - state.server;
      }

      const p = state.points[pi];
      const o = state.points[opp];

      // Win: first to 7 with 2-point lead
      if (p >= 7 && p - o >= 2) {
        winTiebreak(pi);
        return;
      }

      render();
    }

    function winTiebreak(pi) {
      // Record set score as 7-6 for tiebreak winner, plus tiebreak point totals
      const setScore = [0, 0];
      setScore[pi]  = 7;
      setScore[1-pi] = 6;
      state.setHistory.push({ p: setScore, tb: [...state.points] });

      state.sets[pi]++;
      state.games = [0, 0];
      state.points = [0, 0];
      state.isTiebreak = false;
      state.tiebreakPointCount = 0;

      // Post-tiebreak serve: the player who did NOT serve the tiebreak serves first
      state.server = 1 - state.tiebreakFirstServer;

      addLog(`Tiebreak → Player ${pi+1} wins set ${state.sets[0]+state.sets[1]} (7–6)`);

      if (state.sets[pi] >= 2) { winMatch(pi); return; }

      render();
    }
  </script>
</body>
